# remap prefix from 'C-b' to 'C-space'
unbind C-b
set-option -g prefix C-space
bind-key C-space send-prefix

bind-key C-space last-window

set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

is_vim="ps -o state= -o comm= -t '#{pane-tty}' | grep -iqE '^[^TXZ ]+ +(vim|nvim)$'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "send-keys Left"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "send-keys Down"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "send-keys Up"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "send-keys Right"

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
set -g display-time 3000
set -g history-limit 5000



# clock mode
setw -g clock-mode-colour colour172

#pane borders
set -g pane-border-style 'fg=colour1'
set -g pane-active-border-style 'fg=colour172'


# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=colour172'
set -g status-left ''
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50
set -g status-left-length 10
set-option -g message-style bg=colour239,fg=colour172
setw -g window-status-current-style 'fg=colour237 bg=colour172,bold'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=colour172 dim'
setw -g window-status-format ' #I #[f=colour172]#W #[colour172]#F '

# set-option -g status-style fg=colour172 # colour237

# set -Fg 'status-format[1]' '#{status-format[0]}'
# set -g 'status-format[0]' ''
# set -g status 2

unbind -T copy-mode-vi MouseDragEnd1Pane
bind C-g display-popup

set -g default-terminal "screen-256color"
